<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MinMus — Ministerios de Música Católicos</title>
<meta name="description" content="La plataforma para ministerios de música católicos. Cantoral, acordes, esquemas de misa, modo director y comunidad en una sola app."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink: #12101f;
  --ink2: #2d2b52;
  --purple: #3d3a7c;
  --purple-light: #6c63ff;
  --purple-mid: #4e4a9a;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --cream: #f7f4ee;
  --white: #ffffff;
  --gray: #8b8a9a;
  --teal: #1d9e75;
  --radius: 18px;
  --radius-sm: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--ink);
  color: var(--white);
  overflow-x: hidden;
}

/* NOISE TEXTURE OVERLAY */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: .4;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 5%;
  background: rgba(18,16,31,.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.nav-logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.nav-logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 22px; font-weight: 700;
  color: var(--white);
  letter-spacing: -.3px;
}
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a {
  color: rgba(255,255,255,.6);
  text-decoration: none; font-size: 14px; font-weight: 500;
  transition: color .2s;
}
.nav-links a:hover { color: var(--white); }
.nav-cta {
  background: linear-gradient(135deg, var(--purple-mid), var(--purple-light));
  color: var(--white); text-decoration: none;
  padding: 10px 22px; border-radius: 999px;
  font-size: 14px; font-weight: 600;
  transition: opacity .2s, transform .2s;
}
.nav-cta:hover { opacity: .9; transform: translateY(-1px); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
  padding: 120px 5% 80px;
  position: relative;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(78,74,154,.55) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,.12) 0%, transparent 60%),
    var(--ink);
  z-index: -1;
}
.hero-glow {
  position: absolute;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(108,99,255,.18) 0%, transparent 70%);
  top: -100px; left: 50%; transform: translateX(-50%);
  pointer-events: none;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 999px;
  padding: 6px 16px;
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,.7);
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 28px;
  animation: fadeUp .6s ease both;
}
.hero-badge span { color: var(--gold-light); }
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 8vw, 96px);
  font-weight: 900;
  line-height: 1.0;
  letter-spacing: -2px;
  margin-bottom: 24px;
  animation: fadeUp .7s .1s ease both;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-sub {
  font-size: clamp(16px, 2vw, 20px);
  color: rgba(255,255,255,.6);
  max-width: 580px; line-height: 1.7;
  margin-bottom: 44px;
  animation: fadeUp .7s .2s ease both;
}
.hero-buttons {
  display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
  animation: fadeUp .7s .3s ease both;
  margin-bottom: 72px;
}
.btn-store {
  display: flex; align-items: center; gap: 12px;
  background: var(--white);
  color: var(--ink); text-decoration: none;
  padding: 14px 26px; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 15px;
  transition: transform .2s, box-shadow .2s;
}
.btn-store:hover { transform: translateY(-3px); box-shadow: 0 16px 40px rgba(0,0,0,.35); }
.btn-store svg { flex-shrink: 0; }
.btn-store-sub { font-size: 11px; font-weight: 400; color: var(--gray); line-height: 1; }
.btn-store-main { line-height: 1.2; }
.btn-store.dark {
  background: var(--ink2);
  color: var(--white);
  border: 1px solid rgba(255,255,255,.12);
}
.btn-store.dark .btn-store-sub { color: rgba(255,255,255,.5); }

/* PHONE MOCKUP */
.hero-phone {
  position: relative;
  animation: fadeUp .8s .4s ease both;
}
.phone-wrap {
  width: 260px; height: 530px;
  background: linear-gradient(160deg, #2a2845 0%, #1a1830 100%);
  border-radius: 44px;
  border: 8px solid rgba(255,255,255,.1);
  overflow: hidden;
  position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.05);
  margin: 0 auto;
}
.phone-screen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  background: #f0eefa;
  color: var(--ink);
  font-size: 10px;
  overflow: hidden;
}
.phone-header {
  background: linear-gradient(135deg, #3d3a7c, #5a54c4);
  padding: 20px 16px 16px;
  color: white;
}
.phone-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.phone-greeting { font-size: 9px; opacity: .7; }
.phone-name { font-size: 16px; font-weight: 700; }
.phone-tagline { font-size: 8px; opacity: .7; margin-bottom: 12px; }
.phone-stats { display: flex; gap: 20px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,.2); }
.phone-stat span:first-child { font-size: 18px; font-weight: 700; display: block; }
.phone-stat span:last-child { font-size: 7px; opacity: .7; }
.phone-body { padding: 14px 12px; flex: 1; }
.phone-section-title { font-size: 9px; font-weight: 700; color: #1a1830; margin-bottom: 10px; }
.phone-cards { display: flex; gap: 8px; margin-bottom: 14px; }
.phone-card {
  flex: 1; background: white; border-radius: 12px;
  padding: 10px 6px; text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.phone-card-icon {
  width: 28px; height: 28px; border-radius: 8px;
  margin: 0 auto 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.phone-card-label { font-size: 7px; font-weight: 600; color: #1a1830; }
.phone-song { background: white; border-radius: 10px; padding: 8px 10px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.phone-song-icon { width: 28px; height: 28px; background: #3d3a7c; border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; flex-shrink: 0; }
.phone-song-name { font-size: 8px; font-weight: 600; color: #1a1830; }
.phone-song-meta { font-size: 7px; color: #888; }
.phone-nav { display: flex; justify-content: space-around; background: white; padding: 8px 0 10px; border-top: 1px solid #eee; }
.phone-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 7px; color: #888; }
.phone-nav-item.active { color: #3d3a7c; }
.phone-nav-item span { font-size: 14px; }

/* FLOATING BADGES */
.float-badge {
  position: absolute;
  background: rgba(20,18,40,.92);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 12px;
  backdrop-filter: blur(8px);
  animation: float 4s ease-in-out infinite;
}
.float-badge:nth-child(2) { animation-delay: -2s; }
.fb-left { left: -140px; top: 80px; }
.fb-right { right: -140px; top: 160px; }
.fb-label { font-size: 10px; color: rgba(255,255,255,.5); margin-bottom: 2px; }
.fb-value { font-weight: 600; }
.fb-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); display: inline-block; margin-right: 6px; }

/* SECTIONS SHARED */
section { position: relative; z-index: 1; }
.container { max-width: 1100px; margin: 0 auto; padding: 0 5%; }
.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 14px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 4vw, 52px);
  font-weight: 700; line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 20px;
}
.section-sub {
  font-size: 17px; color: rgba(255,255,255,.55);
  max-width: 560px; line-height: 1.7;
}

/* STATS BAR */
.stats-bar {
  background: rgba(255,255,255,.04);
  border-top: 1px solid rgba(255,255,255,.06);
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 40px 5%;
}
.stats-bar-inner {
  max-width: 900px; margin: 0 auto;
  display: flex; justify-content: space-around; gap: 20px;
  flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 42px; font-weight: 900;
  background: linear-gradient(135deg, var(--white), rgba(255,255,255,.6));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1;
}
.stat-num span { color: var(--gold-light); -webkit-text-fill-color: var(--gold-light); }
.stat-label { font-size: 13px; color: rgba(255,255,255,.45); margin-top: 6px; }

/* FEATURES */
.features-section { padding: 100px 0; }
.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin-top: 60px;
}
.feat-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius);
  padding: 28px;
  transition: background .3s, transform .3s, border-color .3s;
  cursor: default;
}
.feat-card:hover {
  background: rgba(255,255,255,.07);
  transform: translateY(-4px);
  border-color: rgba(108,99,255,.35);
}
.feat-card.highlight {
  background: linear-gradient(135deg, rgba(78,74,154,.3), rgba(108,99,255,.15));
  border-color: rgba(108,99,255,.35);
  grid-column: span 2;
}
.feat-icon {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  margin-bottom: 18px;
}
.feat-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
.feat-card p { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.7; }
.feat-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
.feat-tag {
  background: rgba(255,255,255,.07);
  border-radius: 999px; padding: 4px 12px;
  font-size: 11px; color: rgba(255,255,255,.5);
}

/* SONG VIEWER */
.viewer-section {
  padding: 80px 0;
  background: linear-gradient(180deg, transparent, rgba(78,74,154,.08), transparent);
}
.viewer-inner {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 60px; align-items: center;
}
.viewer-text .section-sub { margin-bottom: 32px; }
.viewer-pills { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
.pill {
  display: inline-flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 999px; padding: 8px 16px;
  font-size: 13px; color: rgba(255,255,255,.7);
}
.pill-dot { width: 6px; height: 6px; border-radius: 50%; }
.viewer-mockup {
  background: linear-gradient(160deg, #1e1c38, #161428);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,.08);
  padding: 28px;
  font-family: 'DM Sans', sans-serif;
  box-shadow: 0 30px 60px rgba(0,0,0,.4);
}
.vm-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.vm-cat { font-size: 11px; color: rgba(255,255,255,.4); border-left: 2px solid var(--purple-light); padding-left: 8px; margin-bottom: 4px; }
.vm-title { font-size: 20px; font-weight: 700; }
.vm-controls { display: flex; gap: 8px; }
.vm-btn { width: 32px; height: 32px; border-radius: 8px; background: rgba(255,255,255,.08); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
.vm-section-chip { display: inline-block; background: rgba(255,255,255,.08); border-radius: 999px; padding: 3px 12px; font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 14px; }
.vm-chord { font-size: 12px; font-weight: 700; color: var(--purple-light); font-family: monospace; margin-bottom: 2px; }
.vm-lyric { font-size: 14px; color: rgba(255,255,255,.85); margin-bottom: 10px; line-height: 1.5; }
.vm-lyric strong { color: white; font-weight: 700; }
.vm-toolbar { display: flex; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.07); }
.vm-tool { flex: 1; background: rgba(255,255,255,.06); border-radius: 8px; padding: 8px; text-align: center; font-size: 10px; color: rgba(255,255,255,.4); }
.vm-tool span { display: block; font-size: 16px; margin-bottom: 3px; }
.vm-tool.active { background: var(--purple-mid); color: rgba(255,255,255,.8); }

/* PLANS */
.plans-section { padding: 100px 0; }
.plans-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 20px; margin-top: 60px; }
.plan-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius);
  padding: 32px 28px;
  transition: transform .2s;
  min-width: 0;
}
.plan-card:hover { transform: translateY(-4px); }
.plan-card.featured {
  background: linear-gradient(160deg, rgba(78,74,154,.4), rgba(45,43,82,.6));
  border-color: rgba(108,99,255,.5);
  position: relative;
  overflow: hidden;
}
.plan-card.featured::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--purple-light), var(--gold-light));
}
.plan-badge {
  display: inline-block;
  background: linear-gradient(135deg, var(--purple-light), var(--gold));
  border-radius: 999px; padding: 4px 14px;
  font-size: 11px; font-weight: 600;
  margin-bottom: 20px;
}
.plan-name { font-size: 14px; font-weight: 600; color: rgba(255,255,255,.5); margin-bottom: 8px; letter-spacing: .05em; text-transform: uppercase; }
.plan-price { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
.plan-price sup { font-size: 20px; vertical-align: super; font-family: 'DM Sans', sans-serif; }
.plan-price-sub { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 24px; }
.plan-divider { height: 1px; background: rgba(255,255,255,.08); margin-bottom: 24px; }
.plan-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 12px; font-size: 14px; color: rgba(255,255,255,.65); }
.plan-item::before { content: '✓'; color: var(--teal); font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.plan-cta {
  display: block; text-align: center; text-decoration: none;
  margin-top: 28px; padding: 14px;
  border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600;
  transition: opacity .2s, transform .2s;
}
.plan-cta:hover { opacity: .9; transform: translateY(-1px); }
.plan-cta-primary { background: linear-gradient(135deg, var(--purple-mid), var(--purple-light)); color: white; }
.plan-cta-outline { border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.8); }
.plan-toggle-wrap {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 999px;
  padding: 6px 6px 6px 18px;
  margin-bottom: 48px;
  flex-wrap: wrap;
  justify-content: center;
}
.plan-toggle-btn {
  width: 48px;
  height: 26px;
  border-radius: 999px;
  background: var(--purple-mid);
  border: none;
  cursor: pointer;
  position: relative;
  transition: background .2s;
  flex-shrink: 0;
}
.plan-toggle-dot {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  transition: transform .25s;
  display: block;
}
.plan-toggle-btn.yearly {
  background: var(--gold);
}
.plan-toggle-btn.yearly .plan-toggle-dot {
  transform: translateX(22px);
}

/* COMMUNITY */
.community-section { padding: 100px 0; }
.community-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center; margin-top: 60px; }
.community-cards { display: flex; flex-direction: column; gap: 16px; }
.comm-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: var(--radius);
  padding: 22px;
  display: flex; gap: 16px; align-items: flex-start;
  transition: background .2s;
}
.comm-card:hover { background: rgba(255,255,255,.07); }
.comm-icon { font-size: 28px; flex-shrink: 0; }
.comm-card h4 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.comm-card p { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.6; }
.coming-chip {
  display: inline-block;
  background: rgba(201,168,76,.15);
  border: 1px solid rgba(201,168,76,.3);
  border-radius: 999px; padding: 2px 10px;
  font-size: 10px; color: var(--gold-light);
  font-weight: 600; margin-top: 6px;
}

/* TESTIMONIALS / QUOTE */
.quote-section { padding: 80px 5%; text-align: center; }
.quote-section blockquote {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 3vw, 38px);
  font-style: italic;
  line-height: 1.5;
  color: rgba(255,255,255,.85);
  max-width: 800px; margin: 0 auto 20px;
}
.quote-attr { font-size: 14px; color: rgba(255,255,255,.4); }

/* DOWNLOAD CTA */
.download-section {
  padding: 100px 5%;
  text-align: center;
  background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(78,74,154,.4) 0%, transparent 70%);
}
.download-section .section-title { font-size: clamp(36px, 5vw, 64px); }
.download-section .section-sub { margin: 0 auto 48px; }
.download-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* FOOTER */
footer {
  border-top: 1px solid rgba(255,255,255,.06);
  padding: 40px 5%;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 20px;
}
.footer-logo {
  font-family: 'Playfair Display', serif;
  font-size: 18px; font-weight: 700;
  color: rgba(255,255,255,.5);
}
.footer-links { display: flex; gap: 24px; }
.footer-links a { font-size: 13px; color: rgba(255,255,255,.35); text-decoration: none; transition: color .2s; }
.footer-links a:hover { color: rgba(255,255,255,.6); }
.footer-copy { font-size: 12px; color: rgba(255,255,255,.2); }

/* ANIMATIONS */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
.reveal {
  opacity: 0; transform: translateY(30px);
  transition: opacity .7s ease, transform .7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* MOBILE */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero h1 { font-size: 42px; }
  .features-grid { grid-template-columns: 1fr; }
  .feat-card.highlight { grid-column: span 1; }
  .viewer-inner { grid-template-columns: 1fr; }
  .plans-grid { grid-template-columns: 1fr !important; gap: 16px; }
  .community-grid { grid-template-columns: 1fr; }
  .fb-left, .fb-right { display: none; }
  footer { flex-direction: column; text-align: center; }
  .plan-card {
