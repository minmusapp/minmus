<script>
// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), i * 80);
    }
  });
}, { threshold: 0.12 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

let plansYearly = false;

function togglePlans() {
  plansYearly = !plansYearly;

  const toggle = document.getElementById('plan-toggle');
  const lblMes = document.getElementById('lbl-mes');
  const lblAno = document.getElementById('lbl-ano');

  const priceMusico = document.getElementById('price-musico');
  const subMusico = document.getElementById('sub-musico');
  const altMusico = document.getElementById('alt-musico');

  const priceMin = document.getElementById('price-min');
  const subMin = document.getElementById('sub-min');
  const altMin = document.getElementById('alt-min');

  const pricePar = document.getElementById('price-par');
  const subPar = document.getElementById('sub-par');
  const altPar = document.getElementById('alt-par');

  if (plansYearly) {
    toggle.classList.add('yearly');
    toggle.setAttribute('aria-pressed', 'true');
    lblMes.style.color = 'rgba(255,255,255,.45)';
    lblMes.style.fontWeight = '500';
    lblAno.style.color = 'var(--white)';
    lblAno.style.fontWeight = '600';

    priceMusico.innerHTML = '<sup>$</sup>12.90';
    subMusico.textContent = 'USD por músico / año';
    altMusico.textContent = 'Equivale a USD $1.08 / mes';

    priceMin.innerHTML = '<sup>$</sup>9.90';
    subMin.textContent = 'USD por miembro / año';
    altMin.textContent = 'Equivale a USD $0.82 / mes';

    pricePar.innerHTML = '<sup>$</sup>7.50';
    subPar.textContent = 'USD por miembro / año';
    altPar.textContent = 'Equivale a USD $0.63 / mes';
  } else {
    toggle.classList.remove('yearly');
    toggle.setAttribute('aria-pressed', 'false');
    lblMes.style.color = 'var(--white)';
    lblMes.style.fontWeight = '600';
    lblAno.style.color = 'rgba(255,255,255,.45)';
    lblAno.style.fontWeight = '500';

    priceMusico.innerHTML = '<sup>$</sup>1.29';
    subMusico.textContent = 'USD por músico / mes · 30 días gratis';
    altMusico.textContent = '';

    priceMin.innerHTML = '<sup>$</sup>0.99';
    subMin.textContent = 'USD por miembro / mes · 30 días gratis';
    altMin.textContent = '';

    pricePar.innerHTML = '<sup>$</sup>0.75';
    subPar.textContent = 'USD por miembro / mes · 30 días gratis';
    altPar.textContent = '';
  }
}
</script>
